<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    

    <style>
        * {
            box-sizing: border-box;
            padding: 0;
        }

        body {
            justify-content: center;
        }

        .div1 {
            background: rgb(200, 0, 0);
            color: white;
            padding: 10px;
            width: 500px;
            margin: auto;
            text-align: center;
            font-weight: bold;
            font-size: 30px;
            border: 5px ridge rgb(4, 0, 133);
            height: 80px;
        }

        .btn1 {
            background: rgb(18, 0, 176);
            color: white;
            padding: 10px;
            width: 500px;
            margin: auto;
            text-align: center;
            font-weight: bold;
            font-size: 30px;
            border: 5px ridge rgb(4, 0, 133);
            display: block;
            margin-bottom: 20px;
        }

        .btn2 {
            background: rgb(0, 130, 144);
            color: white;
            padding: 10px;
            width: 500px;
            margin: auto;
            text-align: center;
            font-weight: bold;
            font-size: 30px;
            border: 5px ridge rgb(4, 0, 133);
            display: block;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .btn2:hover {
            background-color: rgb(4, 0, 133);
        }

        .btn1::placeholder {
            color: yellow;
        }

        .input1 {
            background: rgb(72, 72, 72);
            color: white;
            padding: 10px;
            width: 500px;
            margin: auto;
            text-align: center;
            font-weight: bold;
            font-size: 30px;
            border: 5px ridge rgb(4, 0, 133);
            display: block;
            margin-bottom: 20px;
        }

        .btn3 {
            background: rgb(58, 144, 0);
            color: white;
            padding: 10px;
            width: 120px;
            position: absolute;
            left: 1000px;
            bottom: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 30px;
            border: 5px ridge rgb(4, 0, 133);
            display: block;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .btn3:hover {
            background-color: rgb(200, 0, 0);
        }

    </style>
</head>
<body>
   
    <input type="number" class="btn1" id="n1" placeholder="first number" value="10" />
    <input type="number" class="btn1" id="n2" placeholder="second number"  value="20"  />

    <button class="btn2" onclick="sum()">+</button>
    <button class="btn2" onclick="subtract()">-</button>
    <button class="btn2" onclick="multiply()">×</button>
    <button class="btn2" onclick="division()">÷</button>

    <div id="d1" class="div1"></div>

    <button class="btn3" onclick="reset()">Reset</button>

    
    <script>

        function sum()
        {
            var x = document.getElementById("n1").value;
            var y = document.getElementById("n2").value;

            var z = parseInt( x ) + parseInt ( y );

            document.getElementById("d1").innerHTML = z;
        }

        function subtract()
        {
            var x = document.getElementById("n1").value;
            var y = document.getElementById("n2").value;

            var z = parseInt( x ) - parseInt ( y );

            document.getElementById("d1").innerHTML = z;
        }

        function multiply()
        {
            var x = document.getElementById("n1").value;
            var y = document.getElementById("n2").value;

            var z = parseInt( x ) * parseInt ( y );

            document.getElementById("d1").innerHTML = z;
        }

        function division()
        {
            var x = document.getElementById("n1").value;
            var y = document.getElementById("n2").value;

            var z = parseInt( x ) / parseInt ( y );

            document.getElementById("d1").innerHTML = z;
        }

        function reset()
        {
            document.getElementById("d1").innerHTML =  "";
            var x = document.getElementById("n1").value = "10";
            var y = document.getElementById("n2").value = "20";
        }

    </script>
    
</body>
</html>
